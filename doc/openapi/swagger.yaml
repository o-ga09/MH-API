  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: https://mh-api-v2-8aznfogc.an.gateway.dev/
info:
  contact: {}
  description: モンスターハンターAPI
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: MH-API
  version: v0.1.0
paths:
  /armors:
    get:
      consumes:
      - application/json
      description: 全ての防具のリストを返します。
      produces:
      - application/json
      responses:
        "200":
          description: 防具のリスト
          schema:
            $ref: '#/definitions/armor.ListArmorsResponse'
        "500":
          description: サーバ内部エラー
          schema:
            $ref: '#/definitions/armor.ErrorResponse'
      summary: 防具一覧を取得します
      tags:
      - Armors
  /armors/{id}:
    get:
      consumes:
      - application/json
      description: 指定されたIDの防具の詳細を返します。
      parameters:
      - description: 防具ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 防具の詳細
          schema:
            $ref: '#/definitions/armor.ArmorDetailResponse'
        "400":
          description: リクエストパラメータが不正な場合
          schema:
            $ref: '#/definitions/armor.ErrorResponse'
        "404":
          description: 防具が見つからない場合
          schema:
            $ref: '#/definitions/armor.ErrorResponse'
        "500":
          description: サーバ内部エラー
          schema:
            $ref: '#/definitions/armor.ErrorResponse'
      summary: 防具詳細を取得します
      tags:
      - Armors
  /items:
    get:
      description: 全てのアイテム名とIDの一覧を取得する
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/item.Items'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/item.MessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/item.MessageResponse'
      summary: アイテム名の一覧を取得する
      tags:
      - アイテム検索
  /items/{itemId}:
    get:
      consumes:
      - application/json
      description: アイテムを検索して、条件に合致するアイテムを1件取得する
      parameters:
      - description: アイテムID
        in: path
        name: itemId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/item.Item'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/item.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/item.MessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/item.MessageResponse'
      summary: アイテム検索（1件）
      tags:
      - アイテム検索
  /items/monsters/{monsterId}:
    get:
      consumes:
      - application/json
      description: 指定のアイテムが取得可能なモンスターの一覧
      parameters:
      - description: モンスターID
        in: path
        name: monsterId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/item.ItemsByMonster'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/item.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/item.MessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/item.MessageResponse'
      summary: アイテム検索（モンスター別）
      tags:
      - アイテム検索
  /monsters:
    get:
      consumes:
      - application/json
      description: モンスターを検索して、条件に合致するモンスターを複数件取得する
      parameters:
      - in: query
        name: MonsterIds
        type: string
      - in: query
        name: MonsterName
        type: string
      - in: query
        name: UsageElement
        type: string
      - in: query
        name: WeaknessElement
        type: string
      - in: query
        minimum: 0
        name: limit
        type: integer
      - in: query
        minimum: 0
        name: offset
        type: integer
      - enum:
        - asc
        - desc
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/monster.Monsters'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/monster.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/monster.MessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/monster.MessageResponse'
      summary: モンスター検索（複数件）
      tags:
      - モンスター検索
  /monsters/{id}:
    get:
      consumes:
      - application/json
      description: モンスターを検索して、条件に合致するモンスターを1件取得する
      parameters:
      - description: モンスターID
        in: path
        name: request
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/monster.Monster'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/monster.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/monster.MessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/monster.MessageResponse'
      summary: モンスター検索（1件）
      tags:
      - モンスター検索
  /skills:
    get:
      description: 全てのスキルとその情報の一覧を取得する
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/skill.Skills'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/skill.MessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/skill.MessageResponse'
      summary: スキル一覧を取得する
      tags:
      - スキル検索
  /skills/{skillId}:
    get:
      consumes:
      - application/json
      description: スキルを検索して、条件に合致するスキルを1件取得する
      parameters:
      - description: スキルID
        in: path
        name: skillId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/skill.Skill'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/skill.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/skill.MessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/skill.MessageResponse'
      summary: スキル検索（1件）
      tags:
      - スキル検索
  /weapons:
    get:
      consumes:
      - application/json
      description: 指定されたクエリパラメータに基づいて武器のリストを返します。
      parameters:
      - description: 武器ID (完全一致)
        in: query
        name: weapon_id
        type: string
      - description: 武器名 (部分一致を想定)
        in: query
        name: name
        type: string
      - default: 20
        description: 取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: 取得開始位置
        in: query
        name: offset
        type: integer
      - description: ソートフィールド (asc/desc)
        in: query
        name: sort
        type: string
      - description: ソート順 (0:昇順, 1:降順)
        in: query
        name: order
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 武器のリストとページネーション情報
          schema:
            $ref: '#/definitions/weapon.ListWeaponsResponse'
        "400":
          description: リクエストパラメータが不正な場合
          schema:
            $ref: '#/definitions/weapon.ErrorResponse'
        "500":
          description: サーバ内部エラー
          schema:
            $ref: '#/definitions/weapon.ErrorResponse'
      summary: 武器リストを検索します (Gin版)
      tags:
      - Weapons
swagger: "2.0"
