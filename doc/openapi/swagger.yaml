        type: array
      category:
        description: モンスターのカテゴリ
        type: string
      description:
        description: モンスターの説明
        type: string
      element:
        description: モンスターの属性
        type: string
      first_weak_attack:
        description: 最有効弱点
        type: string
      first_weak_element:
        description: 最有効属性
        type: string
      image_url:
        description: モンスター画像URL
        type: string
      location:
        description: モンスターの出現場所
        items:
          type: string
        type: array
      monster_id:
        description: モンスターID
        type: string
      name:
        description: モンスター名
